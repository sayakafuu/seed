<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>種</title><style>
:root{--ink:#282231;--muted:#8b8192;--line:#eee7ef;--glass:#fffdfacc}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI",sans-serif;color:var(--ink);background:radial-gradient(circle at 10% 0%,#82dee258,transparent 28%),radial-gradient(circle at 88% 4%,#ff9fbb42,transparent 24%),linear-gradient(180deg,#fffaff,#fbfdff)}
header{position:sticky;top:0;z-index:10;padding:12px 14px 8px;background:#fffafddd;backdrop-filter:blur(18px);border-bottom:1px solid #eee7ef99}
.top{display:flex;align-items:center;gap:10px}.mark{width:30px;height:30px;border-radius:13px;background:linear-gradient(135deg,#78dadd,#ff9db7 58%,#d7c8ff);box-shadow:0 8px 18px #78dadd55}
h1{margin:0;font-size:23px;font-weight:850;flex:1}.icon{border:0;background:#ffffffe8;border-radius:15px;width:37px;height:37px;font-size:23px;box-shadow:0 10px 24px #30263a18;color:#322b3a}
main{padding:9px 9px 82px;display:flex;flex-direction:column;gap:9px}
.group{border:1px solid #eee7ef;border-radius:22px;background:#ffffffb8;box-shadow:0 10px 26px #30263a12;overflow:hidden}.gh{height:36px;padding:7px 9px 7px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #eee7ef99}.gn{font-size:15px;font-weight:850;flex:1}.gc{font-size:11px;color:var(--muted)}.miniPlus{border:0;background:#fff;border-radius:12px;width:28px;height:28px;font-size:18px;color:#403849;box-shadow:0 4px 12px #30263a12}
.list{padding:6px;display:flex;flex-direction:column;gap:5px}.row{position:relative;border-radius:16px;overflow:hidden;background:#f5eef7}.actions{position:absolute;inset:0;display:flex;justify-content:flex-start}.act{width:78px;border:0;color:#fff;font-size:25px;font-weight:850;background:linear-gradient(135deg,#74c9bb,#b9a4ff)}
.item{position:relative;z-index:2;border:1px solid #eee7ef;border-radius:16px;background:#fffefdf2;box-shadow:0 7px 18px #30263a10;transition:transform .18s ease,box-shadow .18s ease;touch-action:pan-y}.item:before{content:"";position:absolute;left:0;top:0;bottom:0;width:6px;background:var(--c,#78dadd)}.item.open{transform:translateX(78px)}.item.magic{animation:magic .42s ease}
@key
