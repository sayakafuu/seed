<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>種</title><style>
:root{--ink:#292432;--muted:#7d7284;--line:#ece2ea}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI",sans-serif;color:var(--ink);background:radial-gradient(circle at 8% 0%,rgba(118,217,220,.22),transparent 30%),radial-gradient(circle at 92% 3%,rgba(255,159,184,.18),transparent 26%),linear-gradient(180deg,#fff9fd,#fffdf9 58%,#f8fcff)}
header{position:sticky;top:0;z-index:10;padding:14px 15px 10px;background:rgba(255,250,253,.9);backdrop-filter:blur(18px);border-bottom:1px solid #ece2eaaa}.top{display:flex;align-items:center;gap:10px}.logo{width:32px;height:32px;border-radius:13px;background:linear-gradient(135deg,#76d9dc,#ff9fb8 55%,#d8c8ff);box-shadow:0 8px 18px rgba(118,217,220,.28)}h1{margin:0;font-size:24px;font-weight:850;flex:1}.addBtn{width:39px;height:39px;border:0;border-radius:16px;background:#ffffffe0;box-shadow:0 8px 20px rgba(48,38,58,.10);font-size:25px;color:#3a3145}.sub{font-size:12px;color:var(--muted);margin:6px 0 0}
main{padding:12px 11px 78px;display:flex;flex-direction:column;gap:12px}.section{border:1px solid #ece2eae0;border-radius:25px;background:#ffffffb8;box-shadow:0 13px 30px rgba(48,38,58,.09);overflow:hidden}.sectionHead{padding:10px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #ece2eaaa}.sectionName{font-size:16px;font-weight:850;flex:1}.count{font-size:11px;font-weight:800;color:var(--muted);background:#fff;border:1px solid var(--line);border-radius:999px;padding:3px 8px}.sectionMenu{border:0;background:transparent;color:#74687d;font-size:20px;width:30px}
.cards{padding:8px;display:flex;flex-direction:column;gap:8px}.cardWrap{position:relative;border-radius:20px;overflow:hidden;background:#f9f3fa}.actions{position:absolute;inset:0 0 0 auto;display:flex;height:100%}.action{width:70px;border:0;color:#fff;font-weight:850;font-size:13px}.edit{background:#b68ee8}.grown{background:#72c5b2}.drop{background:#f08ca5}.card{position:relative;z-index:2;border:1px solid #ece2eaf5;border-radius:20px;background:linear-gradient(180deg,#fffffff7,#ffffffe0);box-shadow:0 8px 20px rgba(48,38,58,.08);transition:transform .18s ease;touch-action:pan-y}.card.open{transform:translateX(-210px)}.card:before{content:"";position:absolute;left:0;top:0;bottom:0;width:7px;background:var(--seedColor,#76d9dc)}.cardInner{padding:11px 12px 11px 19px}.cardTitle{font-size:16px;font-weight:850;line-height:1.28}.memo{font-size:11px;color:var(--muted);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.stepLine{margin-top:7px;font-size:13px;background:#f9f6fce0;border-radius:14px;padding:8px 9px}.stepLabel{font-size:10px;color:#918797;font-weight:850;margin-right:5px}.stepText{font-weight:780}.doneMini{font-size:10.5px;color:#8c8291;margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.empty{font-size:13px;color:#aaa1ae;text-align:center;padding:13px;border:1px dashed var(--line);border-radius:18px}.addHere{border:1px dashed #ded2de;background:#fff;border-radius:16px;padding:9px;color:#74677d;font-weight:780;font-size:14px}
.fab{position:fixed;right:16px;bottom:18px;z-index:30;width:56px;height:56px;border:0;border-radius:21px;font-size:30px;color:#fff;background:linear-gradient(135deg,#302938,#765f91);box-shadow:0 16px 36px rgba(70,50,82,.24)}
.modalBack{position:fixed;inset:0;z-index:50;background:#2a20304d;display:none;align-items:flex-end}.modal{width:100%;background:#fff;border-radius:29px 29px 0 0;padding:18px;box-shadow:0 -18px 44px rgba(0,0,0,.18)}.modal h2{font-size:19px;margin:0 0 14px}.field{margin:12px 0}.field label{display:block;font-size:12px;color:var(--muted);font-weight:850;margin:0 0 6px}.modal input,.modal textarea{width:100%;border:1px solid var(--line);border-radius:18px;padding:13px 14px;background:#fffdfd;color:var(--ink);font-size:16px}.colorRow{display:flex;gap:9px;flex-wrap:wrap}.swatch{width:36px;height:36px;border-radius:14px;border:2px solid #fff;box-shadow:0 0 0 1px var(--line)}.sel{box-shadow:0 0 0 3px #2f2939}.modalBtns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.btn{border:1px solid var(--line);background:#ffffffe6;border-radius:999px;padding:12px 14px;font-weight:750;color:#4b4056}.primary{border:0!important;color:#fff!important;background:linear-gradient(135deg,#2f2939,#66517d)!important}.dangerZone{margin-top:16px;border-top:1px solid var(--line);padding-top:12px}.textDanger{border:0;background:transparent;color:#d0617a;font-weight:850;padding:10px}
</style></head><body><header><div class="top"><div class="logo"></div><h1>種</h1><button class="addBtn" id="addSeedTop">＋</button></div><div class="sub">忘れたくないことを置いて、少しずつ育てる。</div></header><main id="board"></main><button class="fab" id="fab">＋</button>
<div class="modalBack" id="seedModal"><div class="modal"><h2 id="seedModalTitle">種</h2><div class="field"><label>タイトル</label><input id="seedTitle"></div><div class="field"><label>メモ</label><textarea id="seedMemo" rows="2" placeholder="書きたければ。きっかけ、聞いた人、覚えておきたいことなど"></textarea></div><div class="field"><label>つぎの一歩</label><textarea id="seedStep" rows="2"></textarea></div><div class="field"><label>色</label><div class="colorRow" id="colorRow"></div></div><div class="modalBtns"><button class="btn" id="seedCancel">閉じる</button><button class="btn primary" id="seedSave">保存</button></div><div class="dangerZone" id="dangerZone"><button class="textDanger" id="seedDelete">手放す</button></div></div></div>
<div class="modalBack" id="stepModal"><div class="modal"><h2>つぎへ</h2><div class="field"><label>ここまで</label><input id="doneStep" readonly></div><div class="field"><label>メモ</label><textarea id="doneMemo" rows="2"></textarea></div><div class="field"><label>つぎの一歩</label><textarea id="nextStep" rows="2"></textarea></div><div class="modalBtns"><button class="btn" id="stepCancel">閉じる</button><button class="btn primary" id="stepSave">保存</button></div></div></div>
<div class="modalBack" id="sectionModal"><div class="modal"><h2>項目</h2><div class="field"><label>項目名</label><input id="sectionName"></div><div class="modalBtns"><button class="btn" id="sectionCancel">閉じる</button><button class="btn primary" id="sectionSave">保存</button></div><div class="dangerZone" id="sectionDanger"><button class="textDanger" id="sectionDelete">この項目を手放す</button></div></div></div>
<script>
(function(){const key="seed_app_v02_swipe";const colors=["#76d9dc","#ff9fb8","#bff0dd","#b9ddff","#d8c8ff","#fff0bd","#ffbe88","#c9e76b"];function uid(){return"id"+Date.now().toString(36)+Math.random().toString(36).slice(2,7)}function load(){try{return JSON.parse(localStorage.getItem(key))}catch(e){return null}}function save(){try{localStorage.setItem(key,JSON.stringify(data))}catch(e){}}let data=load();if(!data){let a={id:uid(),name:"やること"},b={id:uid(),name:"行きたい・食べたい"},c={id:uid(),name:"気になる・調べたい"},d={id:uid(),name:"待ち"};data={sections:[a,b,c,d],grown:[],seeds:[{id:uid(),section:a.id,title:"ふるさと納税する",memo:"今年こそ早めにやりたい",step:"上限金額を確認する",color:colors[0],done:[]},{id:uid(),section:c.id,title:"図鑑",memo:"友達におすすめされた",step:"本屋で見てみる",color:colors[3],done:[]},{id:uid(),section:b.id,title:"金沢の水ようかん",memo:"テレビで見ておいしそうだった",step:"お店の名前をメモする",color:colors[1],done:[]},{id:uid(),section:a.id,title:"机の書類",memo:"しまうと忘れそうで置きっぱなし",step:"必要かだけ見る",color:colors[5],done:[]}]};save()}let editingSeed=null,editingSection=null,progressingSeed=null,selectedColor=colors[0];
function render(){board.innerHTML="";data.sections.forEach(sec=>board.appendChild(sectionEl(sec)))}function sectionEl(sec){let el=document.createElement("section");el.className="section";el.innerHTML='<div class="sectionHead"><div class="sectionName"></div><span class="count"></span><button class="sectionMenu">⋯</button></div><div class="cards"></div>';el.querySelector(".sectionName").textContent=sec.name;let list=data.seeds.filter(x=>x.section===sec.id);el.querySelector(".count").textContent=list.length+"件";el.querySelector(".sectionMenu").onclick=()=>openSection(sec);let cards=el.querySelector(".cards");if(!list.length){let emp=document.createElement("div");emp.className="empty";emp.textContent="ここに置く";cards.appendChild(emp)}list.forEach(seed=>cards.appendChild(cardWrap(seed)));let add=document.createElement("button");add.className="addHere";add.textContent="＋ ここに追加";add.onclick=()=>openSeed(null,sec.id);cards.appendChild(add);return el}
function cardWrap(seed){let wrap=document.createElement("div");wrap.className="cardWrap";wrap.innerHTML='<div class="actions"><button class="action edit">編集</button><button class="action grown">育った</button><button class="action drop">手放す</button></div>';let card=document.createElement("article");card.className="card";card.style.setProperty("--seedColor",seed.color||colors[0]);card.innerHTML='<div class="cardInner"><div class="cardTitle"></div><div class="memo"></div><div class="stepLine"><span class="stepLabel">つぎ</span><span class="stepText"></span></div><div class="doneMini"></div></div>';card.querySelector(".cardTitle").textContent=seed.title;card.querySelector(".memo").textContent=seed.memo||"";card.querySelector(".stepText").textContent=seed.step||"未設定";let last=(seed.done||[]).slice(-1)[0];card.querySelector(".doneMini").textContent=last?("ここまで："+last.step+(last.memo?" / "+last.memo:"")):"";wrap.appendChild(card);let startX=0,currentX=0,open=false;card.addEventListener("touchstart",e=>{startX=e.touches[0].clientX;currentX=0},{passive:true});card.addEventListener("touchmove",e=>{currentX=e.touches[0].clientX-startX;if(currentX<0){card.style.transform="translateX("+Math.max(currentX,-210)+"px)"}},{passive:true});card.addEventListener("touchend",()=>{if(currentX<-70){card.classList.add("open");open=true}else{card.classList.remove("open");card.style.transform="";open=false}});card.onclick=()=>{if(open){card.classList.remove("open");card.style.transform="";open=false}else openStep(seed)};wrap.querySelector(".edit").onclick=()=>openSeed(seed);wrap.querySelector(".grown").onclick=()=>grow(seed.id);wrap.querySelector(".drop").onclick=()=>drop(seed.id);return wrap}
function openSeed(seed,sectionId){editingSeed=seed||{id:uid(),section:sectionId||data.sections[0].id,title:"",memo:"",step:"",color:colors[0],done:[]};selectedColor=editingSeed.color||colors[0];seedModalTitle.textContent=seed?"種を編集":"種を追加";seedTitle.value=editingSeed.title||"";seedMemo.value=editingSeed.memo||"";seedStep.value=editingSeed.step||"";dangerZone.style.display=seed?"block":"none";drawColors();seedModal.style.display="flex"}function drawColors(){colorRow.innerHTML="";colors.forEach(c=>{let b=document.createElement("button");b.className="swatch"+(selectedColor===c?" sel":"");b.style.background=c;b.type="button";b.onclick=()=>{selectedColor=c;drawColors()};colorRow.appendChild(b)})}function openStep(seed){progressingSeed=seed;doneStep.value=seed.step||"";doneMemo.value="";nextStep.value="";stepModal.style.display="flex"}function openSection(sec){editingSection=sec||{id:uid(),name:""};sectionName.value=editingSection.name||"";sectionDanger.style.display=sec?"block":"none";sectionModal.style.display="flex"}function grow(id){let i=data.seeds.findIndex(x=>x.id===id);if(i<0)return;let seed=data.seeds.splice(i,1)[0];data.grown=data.grown||[];data.grown.unshift({...seed,grownAt:new Date().toISOString()});save();render()}function drop(id){data.seeds=data.seeds.filter(x=>x.id!==id);save();render()}function deleteSection(id){data.seeds=data.seeds.filter(x=>x.section!==id);data.sections=data.sections.filter(x=>x.id!==id);if(!data.sections.length)data.sections.push({id:uid(),name:"未分類"});save();render()}
addSeedTop.onclick=()=>openSeed();fab.onclick=()=>openSeed();seedCancel.onclick=()=>seedModal.style.display="none";stepCancel.onclick=()=>stepModal.style.display="none";sectionCancel.onclick=()=>sectionModal.style.display="none";seedSave.onclick=()=>{let title=seedTitle.value.trim();if(!title)return;editingSeed.title=title;editingSeed.memo=seedMemo.value.trim();editingSeed.step=seedStep.value.trim();editingSeed.color=selectedColor;if(!data.seeds.some(x=>x.id===editingSeed.id))data.seeds.unshift(editingSeed);save();seedModal.style.display="none";render()};seedDelete.onclick=()=>{if(editingSeed){drop(editingSeed.id);seedModal.style.display="none"}};stepSave.onclick=()=>{if(!progressingSeed)return;let memo=doneMemo.value.trim(),next=nextStep.value.trim();if(progressingSeed.step){progressingSeed.done=progressingSeed.done||[];progressingSeed.done.push({step:progressingSeed.step,memo:memo,at:new Date().toISOString()})}progressingSeed.step=next;save();stepModal.style.display="none";render()};sectionSave.onclick=()=>{let name=sectionName.value.trim();if(!name)return;editingSection.name=name;if(!data.sections.some(x=>x.id===editingSection.id))data.sections.push(editingSection);save();sectionModal.style.display="none";render()};sectionDelete.onclick=()=>{if(editingSection){deleteSection(editingSection.id);sectionModal.style.display="none"}};render()})();
</script></body></html>
